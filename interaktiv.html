<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lena und das Geheimnis der silbernen Hufspur</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  background: #1a1a2e; color: #3d2b1f;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
:root {
  --gold: #c9a84c; --gold-light: #f0d78c; --cream: #fdf6e3;
  --brown: #5c3d2e; --brown-light: #8b6d5c;
  --green: #4a7c59; --green-light: #7fb069;
  --silver: #c0c0c0; --silver-glow: #e8e8ff;
  --sky: #87ceeb; --night: #1a1a3e; --moon: #f5f0cd;
  --radius: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* ===== SCREENS ===== */
.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  transition: opacity 0.5s ease; opacity: 0;
}
.screen.active { display: flex; opacity: 1; }

/* ===== START SCREEN ===== */
#startScreen {
  background: linear-gradient(180deg, #1a1a3e 0%, #2d1b4e 40%, #3d2b5e 100%);
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
#startScreen::before {
  content: ''; position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, #f5f0cd 0%, #f5f0cd88 40%, transparent 70%);
  box-shadow: 0 0 80px 40px #f5f0cd44;
  animation: moonPulse 4s ease-in-out infinite;
}
@keyframes moonPulse {
  0%,100% { box-shadow: 0 0 80px 40px #f5f0cd44; }
  50% { box-shadow: 0 0 120px 60px #f5f0cd66; }
}
.start-title {
  font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--gold-light); text-align: center;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  z-index: 2; margin-top: 200px; line-height: 1.3;
}
.start-subtitle {
  font-family: 'Patrick Hand', cursive; font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--silver); margin-top: 8px; z-index: 2;
}
.start-btn {
  margin-top: 40px; z-index: 2; padding: 18px 48px; border: none; border-radius: 50px;
  background: linear-gradient(135deg, var(--gold), #d4a843);
  color: #fff; font-family: 'Quicksand', sans-serif;
  font-size: 1.3rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 30px rgba(201,168,76,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
}
.start-btn:hover,.start-btn:active {
  transform: scale(1.05); box-shadow: 0 6px 40px rgba(201,168,76,0.7);
}
.stars { position: absolute; inset: 0; z-index: 1; }
.star {
  position: absolute; width: 2px; height: 2px;
  background: #fff; border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ===== GLOBAL CONTROLS ===== */
.global-controls {
  position: fixed; top: 8px; right: 8px; z-index: 1100;
  display: flex; gap: 4px;
}
.ctrl-btn {
  width: 36px; height: 36px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.85); color: var(--brown);
  font-size: 1rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  transition: transform 0.15s;
}
.ctrl-btn:active { transform: scale(0.9); }
.ctrl-btn.muted { opacity: 0.4; }

/* ===== BOTTOM NAVIGATION ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
  background: var(--cream); display: flex; justify-content: space-around;
  align-items: center; box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
  z-index: 1000; border-top: 2px solid var(--gold-light);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  background: none; border: none; cursor: pointer; padding: 6px 10px;
  border-radius: 12px; transition: background 0.2s, transform 0.15s;
  color: var(--brown-light); font-size: 0.55rem;
  font-family: 'Quicksand', sans-serif; font-weight: 600;
}
.nav-btn.active { color: var(--gold); }
.nav-btn:active { transform: scale(0.92); }
.nav-btn svg { width: 24px; height: 24px; }
.nav-btn.active svg { filter: drop-shadow(0 0 4px var(--gold)); }

/* ===== STORY SCREEN ===== */
#storyScreen { background: var(--cream); padding-bottom: 64px; }
.story-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: linear-gradient(135deg, var(--brown) 0%, #7a5a48 100%);
  color: var(--cream); min-height: 48px;
}
.story-header h2 {
  font-family: 'Playfair Display', serif; font-size: 0.9rem;
  flex: 1; text-align: center; line-height: 1.2;
}
.ch-btn {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 1.2rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s; flex-shrink: 0;
}
.ch-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
.ch-btn:disabled { opacity: 0.3; cursor: default; }
/* TTS button in story header */
.tts-btn { background: rgba(255,255,255,0.2); margin-left: 4px; }
.tts-btn.speaking { background: rgba(76,175,80,0.5); }

.story-content {
  flex: 1; overflow-y: auto; scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

/* Chapter illustration with animated overlays */
.ch-illust {
  width: 100%; aspect-ratio: 4/3; overflow: hidden;
  position: relative;
}
.ch-illust img {
  width: 100%; height: 100%; object-fit: cover;
  animation: kenBurns 25s ease-in-out infinite alternate;
  filter: saturate(1.15) contrast(1.05);
}
@keyframes kenBurns {
  0% { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.08) translate(-1%,-1%); }
}
.ch-illust::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, var(--cream) 100%);
  pointer-events: none;
}
/* Animated particles on illustrations */
.illust-particles {
  position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%; pointer-events: none;
}
/* Magical glow for special chapters */
.ch-illust.magical::before {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(192,192,255,0.2) 0%, transparent 70%);
  animation: magicPulse 3s ease-in-out infinite; pointer-events: none;
}
@keyframes magicPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
/* Rain overlay */
.rain-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden;
}
.raindrop {
  position: absolute; width: 1px; background: linear-gradient(180deg, transparent, rgba(174,194,224,0.6));
  animation: rainFall linear infinite;
}
@keyframes rainFall {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(calc(100% + 100vh)); }
}
/* Floating hoofprints */
.hoof-particle {
  position: absolute; font-size: 12px; opacity: 0;
  animation: hoofFloat 4s ease-in-out infinite; pointer-events: none;
}
@keyframes hoofFloat {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  20% { opacity: 0.7; transform: translateY(-10px) scale(1); }
  80% { opacity: 0.5; transform: translateY(-50px) scale(0.8); }
  100% { opacity: 0; transform: translateY(-70px) scale(0.3); }
}
/* Firefly effect */
.firefly {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: #ffe082; box-shadow: 0 0 6px 2px #ffe08288;
  animation: fireflyDrift 6s ease-in-out infinite; pointer-events: none;
}
@keyframes fireflyDrift {
  0%,100% { opacity: 0; transform: translate(0,0); }
  25% { opacity: 1; transform: translate(15px,-20px); }
  50% { opacity: 0.6; transform: translate(-10px,-35px); }
  75% { opacity: 0.8; transform: translate(20px,-15px); }
}
/* Moon glow */
.moon-glow {
  position: absolute; top: 5%; right: 10%; width: 60px; height: 60px;
  border-radius: 50%; background: radial-gradient(circle, #f5f0cd 0%, #f5f0cd66 40%, transparent 70%);
  box-shadow: 0 0 40px 20px #f5f0cd33; pointer-events: none; z-index: 2;
  animation: moonPulse 4s ease-in-out infinite;
}

.ch-text {
  padding: 16px 16px 24px; font-size: 1rem; line-height: 1.75;
  color: var(--brown); max-width: 680px; margin: 0 auto;
}
.ch-text p { margin-bottom: 14px; }
.ch-text .riddle {
  display: block; margin: 14px 0; padding: 14px 16px;
  background: linear-gradient(135deg, #f5f0e0, #ede4cc);
  border-left: 4px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-family: 'Patrick Hand', cursive; font-size: 1.1rem;
  line-height: 1.8; color: var(--brown);
}
.ch-text .separator {
  text-align: center; margin: 20px 0; font-size: 1.1rem;
  color: var(--gold); letter-spacing: 8px;
}

/* Chapter dots */
.ch-dots {
  display: flex; justify-content: center; gap: 5px; padding: 8px 0 4px;
  background: var(--cream); flex-wrap: wrap;
}
.ch-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #ddd; border: none; cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.ch-dot.read { background: var(--green-light); }
.ch-dot.current { background: var(--gold); transform: scale(1.4); }

/* Chapter select overlay */
.overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.6); display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.active { display: flex; }
.overlay-panel {
  background: var(--cream); border-radius: 20px;
  padding: 20px; width: 90%; max-width: 400px; max-height: 80vh;
  overflow-y: auto; box-shadow: var(--shadow);
}
.overlay-panel h3 {
  font-family: 'Playfair Display', serif; text-align: center;
  margin-bottom: 14px; color: var(--brown); font-size: 1.2rem;
}
.ch-sel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border: none; width: 100%;
  background: #fff; border-radius: 12px; margin-bottom: 6px;
  cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 0.9rem;
  color: var(--brown); text-align: left;
  transition: background 0.2s, transform 0.1s;
}
.ch-sel-item:active { transform: scale(0.97); background: var(--gold-light); }
.ch-sel-item .cnum {
  width: 28px; height: 28px; border-radius: 50%; background: var(--gold);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
}
.close-btn {
  display: block; margin: 14px auto 0; padding: 10px 28px;
  border: none; border-radius: 50px; background: var(--brown);
  color: #fff; font-size: 0.95rem; cursor: pointer;
  font-family: 'Quicksand', sans-serif;
}

/* ===== MAP SCREEN ===== */
#mapScreen { background: linear-gradient(180deg, #e8f5e9, #c8e6c9); padding-bottom: 64px; }
.map-header {
  padding: 10px 14px; text-align: center;
  background: linear-gradient(135deg, var(--green), #5d8a6b); color: #fff;
}
.map-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.map-header p { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
.map-wrap {
  flex: 1; overflow: hidden; position: relative;
  touch-action: none; /* we handle touch manually */
}
.map-inner {
  width: 100%; height: 100%; position: relative;
  transform-origin: 0 0; transition: transform 0.1s ease-out;
}
.farm-map { width: 100%; min-width: 700px; min-height: 500px; position: relative; padding: 20px; }
.farm-map svg { width: 100%; height: auto; }
.map-pin {
  position: absolute; cursor: pointer; transition: transform 0.2s; z-index: 10;
}
.map-pin:active { transform: scale(1.2); }
.map-pin-icon {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border: 3px solid #fff; animation: pinBob 2s ease-in-out infinite;
}
@keyframes pinBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.map-pin-label {
  position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
  white-space: nowrap; font-size: 0.65rem; font-weight: 700;
  background: rgba(255,255,255,0.9); padding: 2px 6px;
  border-radius: 8px; color: var(--brown);
}
/* Map zoom controls */
.map-zoom {
  position: absolute; bottom: 16px; right: 16px; z-index: 20;
  display: flex; flex-direction: column; gap: 4px;
}
.map-zoom button {
  width: 40px; height: 40px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.9); font-size: 1.3rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); color: var(--brown);
}

/* Map popup */
.map-popup {
  position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.map-popup.active { display: flex; }
.popup-card {
  background: var(--cream); border-radius: 20px; width: 90%; max-width: 380px;
  overflow: hidden; box-shadow: var(--shadow);
  animation: popIn 0.3s ease;
}
@keyframes popIn { from { transform: scale(0.8) translateY(20px); opacity:0; } to { transform: scale(1); opacity:1; } }
.popup-card img { width: 100%; height: 150px; object-fit: cover; }
.popup-card .popup-body { padding: 14px 18px 18px; }
.popup-body h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--brown); margin-bottom: 6px; }
.popup-body p { font-size: 0.85rem; line-height: 1.5; color: var(--brown-light); }
.popup-close {
  display: block; margin: 10px auto 0; padding: 8px 24px;
  border: none; border-radius: 50px; background: var(--green);
  color: #fff; font-size: 0.9rem; cursor: pointer; font-family: 'Quicksand',sans-serif;
}
.popup-action {
  display: block; margin: 6px auto 0; padding: 7px 20px;
  border: 2px solid var(--gold); border-radius: 50px; background: transparent;
  color: var(--gold); font-size: 0.8rem; cursor: pointer;
  font-family: 'Quicksand', sans-serif; font-weight: 600;
}

/* ===== HORSES SCREEN ===== */
#horsesScreen { background: linear-gradient(180deg, #fdf6e3, #f5edd6); padding-bottom: 64px; }
.horses-header {
  padding: 10px 14px; text-align: center;
  background: linear-gradient(135deg, #8b6d5c, #a0826e); color: #fff;
}
.horses-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.horses-grid {
  flex: 1; overflow-y: auto; padding: 14px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px; align-content: start; -webkit-overflow-scrolling: touch;
}
.horse-card { perspective: 800px; cursor: pointer; height: 210px; }
.horse-card-inner {
  width: 100%; height: 100%; position: relative;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.horse-card.flipped .horse-card-inner { transform: rotateY(180deg); }
.horse-card-front, .horse-card-back {
  position: absolute; inset: 0; border-radius: var(--radius);
  backface-visibility: hidden; overflow: hidden;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
}
.horse-card-front {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 10px;
}
.horse-card-front .hemoji { font-size: 2.8rem; margin-bottom: 6px; }
.horse-card-front h4 { font-family: 'Playfair Display', serif; font-size: 0.95rem; margin-bottom: 3px; }
.horse-card-front .htrait { font-size: 0.7rem; opacity: 0.7; font-style: italic; }
.horse-card-back {
  transform: rotateY(180deg); padding: 12px; display: flex;
  flex-direction: column; font-size: 0.7rem; line-height: 1.4;
}
.horse-card-back h4 { font-family: 'Playfair Display', serif; font-size: 0.9rem; margin-bottom: 4px; text-align: center; }
.horse-card-back .stat { margin-bottom: 2px; }
.horse-card-back .stat b { font-weight: 700; }
.horse-card-back .hdesc { flex: 1; font-style: italic; margin-top: 4px; font-size: 0.65rem; line-height: 1.3; }

.horse-mondschimmer .horse-card-front { background: linear-gradient(135deg, #e8e8ff, #c8c8e8); }
.horse-mondschimmer .horse-card-back { background: linear-gradient(135deg, #d8d8f0, #b8b8d8); color: #2a2a4a; }
.horse-sturmwind .horse-card-front { background: linear-gradient(135deg, #e8d4c0, #d4b896); }
.horse-sturmwind .horse-card-back { background: linear-gradient(135deg, #dcc8b0, #c8a880); color: #3d2b1f; }
.horse-butterblume .horse-card-front { background: linear-gradient(135deg, #fff3c4, #ffe082); }
.horse-butterblume .horse-card-back { background: linear-gradient(135deg, #ffe8a0, #ffd54f); color: #5d4037; }
.horse-flecki .horse-card-front { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); }
.horse-flecki .horse-card-back { background: linear-gradient(135deg, #b0d8b2, #81c784); color: #1b5e20; }
.horse-kupfer .horse-card-front { background: linear-gradient(135deg, #e0c8a8, #c4a47c); }
.horse-kupfer .horse-card-back { background: linear-gradient(135deg, #d4b890, #b89468); color: #3e2723; }
.horse-sternchen .horse-card-front { background: linear-gradient(135deg, #e1bee7, #ce93d8); }
.horse-sternchen .horse-card-back { background: linear-gradient(135deg, #d5a8e0, #ba68c8); color: #4a148c; }
.horse-nordlicht .horse-card-front { background: linear-gradient(135deg, #e0e0e0, #bdbdbd); }
.horse-nordlicht .horse-card-back { background: linear-gradient(135deg, #d0d0d0, #a0a0a0); color: #212121; }

/* ===== QUIZ SCREEN ===== */
#quizScreen { background: linear-gradient(180deg, #e3f2fd, #bbdefb); padding-bottom: 64px; }
.quiz-header {
  padding: 10px 14px; text-align: center;
  background: linear-gradient(135deg, #1565c0, #42a5f5); color: #fff;
}
.quiz-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.quiz-header .qscore { font-size: 0.75rem; opacity: 0.9; margin-top: 2px; }
/* Quiz mode tabs */
.quiz-tabs {
  display: flex; gap: 6px; padding: 10px 14px 4px; justify-content: center;
  background: #e3f2fd;
}
.quiz-tab {
  padding: 8px 16px; border: 2px solid #90caf9; border-radius: 50px;
  background: #fff; cursor: pointer; font-size: 0.8rem;
  font-family: 'Quicksand', sans-serif; font-weight: 600; color: #1565c0;
  transition: background 0.2s, color 0.2s;
}
.quiz-tab.active { background: #1565c0; color: #fff; border-color: #1565c0; }
.quiz-content {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; align-items: center;
  -webkit-overflow-scrolling: touch;
}
.quiz-card {
  background: #fff; border-radius: 20px; padding: 20px;
  width: 100%; max-width: 500px; box-shadow: var(--shadow);
  animation: cardIn 0.4s ease;
}
@keyframes cardIn { from { transform: translateX(30px); opacity:0; } to { transform:translateX(0); opacity:1; } }
.qprogress { font-size: 0.75rem; color: #999; text-align: center; margin-bottom: 10px; }
.qquestion {
  font-size: 1.05rem; font-weight: 700; color: var(--brown);
  text-align: center; margin-bottom: 16px; line-height: 1.4;
}
.qanswers { display: flex; flex-direction: column; gap: 8px; }
.qanswer {
  padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 14px;
  background: #fafafa; cursor: pointer; font-size: 0.95rem;
  font-family: 'Quicksand', sans-serif; color: var(--brown);
  transition: all 0.2s; text-align: left;
}
.qanswer:active { transform: scale(0.97); }
.qanswer.correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; animation: cpulse 0.5s ease; }
@keyframes cpulse { 0% { transform: scale(1); } 30% { transform: scale(1.03); } 100% { transform: scale(1); } }
.qanswer.wrong { border-color: #ef5350; background: #ffebee; color: #c62828; animation: wshake 0.4s ease; }
@keyframes wshake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.qfeedback { text-align: center; margin-top: 12px; font-size: 0.9rem; font-weight: 600; min-height: 20px; }
.qnext {
  display: none; margin: 12px auto 0; padding: 10px 28px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #42a5f5, #1565c0);
  color: #fff; font-size: 0.95rem; cursor: pointer;
  font-family: 'Quicksand', sans-serif; font-weight: 700;
}
.qnext.visible { display: block; }
.qresult { text-align: center; padding: 24px; }
.qresult .remoji { font-size: 3.5rem; margin-bottom: 12px; }
.qresult h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--brown); margin-bottom: 8px; }
.qresult p { font-size: 0.95rem; color: var(--brown-light); }
.qrestart {
  margin-top: 16px; padding: 12px 32px; border: none; border-radius: 50px;
  background: var(--gold); color: #fff; font-size: 1rem; cursor: pointer;
  font-family: 'Quicksand', sans-serif; font-weight: 700;
}

/* ===== MEMORY GAME ===== */
.memory-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; width: 100%; max-width: 400px; margin: 0 auto;
}
.mem-card {
  aspect-ratio: 3/4; border-radius: 12px; cursor: pointer;
  perspective: 600px; position: relative;
}
.mem-card-inner {
  width: 100%; height: 100%; position: relative;
  transition: transform 0.4s; transform-style: preserve-3d;
}
.mem-card.flipped .mem-card-inner, .mem-card.matched .mem-card-inner { transform: rotateY(180deg); }
.mem-card.matched { pointer-events: none; }
.mem-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 1.8rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.mem-front { background: linear-gradient(135deg, var(--gold-light), var(--gold)); }
.mem-front::after { content: '?'; font-size: 1.6rem; color: #fff; font-weight: 700; }
.mem-back { transform: rotateY(180deg); }
.mem-card.matched .mem-back { box-shadow: 0 0 12px rgba(76,175,80,0.5); }
.memory-status {
  text-align: center; margin-bottom: 12px; font-size: 0.9rem;
  color: var(--brown-light); font-weight: 600;
}

/* ===== WER BIN ICH? ===== */
.wbi-card {
  background: #fff; border-radius: 20px; padding: 20px;
  width: 100%; max-width: 500px; box-shadow: var(--shadow);
  text-align: center;
}
.wbi-clues { margin: 16px 0; text-align: left; }
.wbi-clue {
  padding: 8px 14px; margin-bottom: 6px; border-radius: 10px;
  background: #f5f5f5; font-size: 0.9rem; color: var(--brown);
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.4s, transform 0.4s;
}
.wbi-clue.visible { opacity: 1; transform: translateX(0); }
.wbi-choices {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px;
}
.wbi-choice {
  padding: 12px; border: 2px solid #e0e0e0; border-radius: 14px;
  background: #fafafa; cursor: pointer; font-size: 0.95rem;
  font-family: 'Quicksand', sans-serif; transition: all 0.2s;
  text-align: center;
}
.wbi-choice.correct { border-color: #4caf50; background: #e8f5e9; }
.wbi-choice.wrong { border-color: #ef5350; background: #ffebee; }

/* ===== ADVENTURE SCREEN ===== */
#adventureScreen { background: var(--cream); padding-bottom: 64px; }
.adv-header {
  padding: 10px 14px; text-align: center;
  background: linear-gradient(135deg, #4a148c, #7b1fa2); color: #fff;
}
.adv-header h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
.adv-content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.adv-scene {
  position: relative; width: 100%;
}
.adv-scene img {
  width: 100%; aspect-ratio: 16/10; object-fit: cover;
  filter: saturate(1.1) contrast(1.05);
}
.adv-scene::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
}
.adv-text {
  padding: 16px; font-size: 0.95rem; line-height: 1.6;
  color: var(--brown); max-width: 600px; margin: 0 auto;
}
.adv-text p { margin-bottom: 10px; }
/* Inventory */
.adv-inventory {
  display: flex; gap: 8px; padding: 8px 16px;
  background: rgba(74,28,140,0.08); border-radius: 12px;
  margin: 0 16px 10px; flex-wrap: wrap; min-height: 44px;
  align-items: center;
}
.adv-inventory-title {
  font-size: 0.7rem; font-weight: 700; color: var(--brown-light);
  margin-right: 4px;
}
.inv-item {
  display: flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--gold-light); font-size: 0.75rem;
  animation: itemPop 0.4s ease;
}
@keyframes itemPop { from { transform: scale(0); } to { transform: scale(1); } }
/* Choices */
.adv-choices {
  display: flex; flex-direction: column; gap: 8px;
  padding: 0 16px 20px; max-width: 600px; margin: 0 auto;
}
.adv-choice {
  padding: 14px 18px; border: 2px solid var(--gold);
  border-radius: 14px; background: #fff; cursor: pointer;
  font-size: 0.95rem; font-family: 'Quicksand', sans-serif;
  color: var(--brown); transition: all 0.2s; text-align: left;
}
.adv-choice:active { transform: scale(0.97); background: var(--gold-light); }
.adv-choice:hover { background: #fff8e1; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 4px; }

/* Silver hoofprint on tap */
.hoof-trail {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 16px; height: 18px; opacity: 0;
}
.hoof-trail::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse, var(--silver-glow) 0%, transparent 70%);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: hoofFade 1.5s ease forwards;
}
@keyframes hoofFade { 0% { opacity: 0.8; } 100% { opacity: 0; transform: scale(0.5); } }

/* ===== RESPONSIVE ===== */
@media (min-width: 768px) {
  .horses-grid { grid-template-columns: repeat(4, 1fr); }
  .horse-card { height: 250px; }
  .ch-text { font-size: 1.05rem; padding: 24px 36px 36px; }
  .memory-grid { grid-template-columns: repeat(4, 1fr); max-width: 500px; }
}
@media (max-width: 380px) {
  .nav-btn { padding: 5px 6px; font-size: 0.5rem; }
  .nav-btn svg { width: 20px; height: 20px; }
  .bottom-nav { height: 56px; }
  #storyScreen, #mapScreen, #horsesScreen, #quizScreen, #adventureScreen { padding-bottom: 56px; }
}
</style>
</head>

<script>
// ========== AUDIO SYSTEM ==========
const AudioMgr = {
  ctx: null, muted: false, nodes: [], currentAmb: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  stopAll() {
    this.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
    this.nodes = [];
    this.currentAmb = null;
  },
  createNoise(duration) {
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * duration, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  },
  playAmbient(type) {
    if (this.muted || this.currentAmb === type) return;
    this.init(); this.stopAll(); this.currentAmb = type;
    const ctx = this.ctx;
    if (type === 'farm') {
      // Gentle wind + birds
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
      const g = ctx.createGain(); g.gain.value = 0.03;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
      // Bird chirps
      const birdLoop = () => {
        if (this.muted || this.currentAmb !== 'farm') return;
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.value = 2000 + Math.random() * 2000;
        const g2 = ctx.createGain(); g2.gain.value = 0;
        g2.gain.setValueAtTime(0, ctx.currentTime);
        g2.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 0.05);
        g2.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
        o.connect(g2); g2.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.2);
        setTimeout(birdLoop, 2000 + Math.random() * 5000);
      };
      setTimeout(birdLoop, 1000);
    } else if (type === 'rain') {
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 0.5;
      const g = ctx.createGain(); g.gain.value = 0.08;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
    } else if (type === 'night') {
      // Crickets
      const cricketLoop = () => {
        if (this.muted || this.currentAmb !== 'night') return;
        const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 4500;
        const g2 = ctx.createGain();
        const t = ctx.currentTime;
        g2.gain.setValueAtTime(0, t);
        for (let i = 0; i < 8; i++) {
          g2.gain.setValueAtTime(0.015, t + i * 0.06);
          g2.gain.setValueAtTime(0, t + i * 0.06 + 0.03);
        }
        o.connect(g2); g2.connect(ctx.destination);
        o.start(); o.stop(t + 0.5);
        setTimeout(cricketLoop, 1500 + Math.random() * 3000);
      };
      cricketLoop();
      // Wind
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
      const g = ctx.createGain(); g.gain.value = 0.025;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
    } else if (type === 'forest') {
      // Stream + wind
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 2;
      const g = ctx.createGain(); g.gain.value = 0.04;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
    } else if (type === 'storm') {
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 600;
      const g = ctx.createGain(); g.gain.value = 0.12;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
      // Thunder
      const thunderLoop = () => {
        if (this.muted || this.currentAmb !== 'storm') return;
        const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 40;
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.15, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
        o.connect(g2); g2.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 1.5);
        setTimeout(thunderLoop, 6000 + Math.random() * 8000);
      };
      setTimeout(thunderLoop, 2000);
    } else if (type === 'magic') {
      // Ethereal shimmer
      const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 528;
      const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 396;
      const g1 = ctx.createGain(); g1.gain.value = 0.02;
      const g2 = ctx.createGain(); g2.gain.value = 0.015;
      o1.connect(g1); g1.connect(ctx.destination);
      o2.connect(g2); g2.connect(ctx.destination);
      o1.start(); o2.start();
      this.nodes.push(o1, o2);
      // Gentle noise
      const noise = ctx.createBufferSource();
      noise.buffer = this.createNoise(4); noise.loop = true;
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 200;
      const gn = ctx.createGain(); gn.gain.value = 0.02;
      noise.connect(f); f.connect(gn); gn.connect(ctx.destination); noise.start();
      this.nodes.push(noise);
    }
  },
  toggle() {
    this.muted = !this.muted;
    if (this.muted) this.stopAll();
    document.getElementById('soundBtn').textContent = this.muted ? '\u{1F507}' : '\u{1F509}';
    document.getElementById('soundBtn').classList.toggle('muted', this.muted);
  }
};

const chapterAmbient = ['farm','rain','forest','night','farm','farm','storm','night','magic','magic','farm','magic'];

function toggleSound() { AudioMgr.toggle(); }

// ========== TTS ==========
let ttsActive = false;
let ttsUtterance = null;

function toggleTTS() {
  if (ttsActive) { stopTTS(); return; }
  const text = document.getElementById('storyCont')?.innerText;
  if (!text || !window.speechSynthesis) return;
  ttsActive = true;
  document.getElementById('ttsBtn').classList.add('speaking');
  ttsUtterance = new SpeechSynthesisUtterance(text);
  ttsUtterance.lang = 'de-DE'; ttsUtterance.rate = 0.9;
  // Try to find a German voice
  const voices = speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de'));
  if (deVoice) ttsUtterance.voice = deVoice;
  ttsUtterance.onend = () => stopTTS();
  speechSynthesis.speak(ttsUtterance);
}

function stopTTS() {
  speechSynthesis.cancel();
  ttsActive = false;
  document.getElementById('ttsBtn').classList.remove('speaking');
}

// ========== DATA ==========
const chapters = [

      '<span class="separator">\u2604 \u2604 \u2604</span>',
      'Sturmwind auf der Koppel war <em>wild</em>-sch\u00f6n. Gro\u00df, kraftvoll, mit Fell wie poliertes Mahagoni. Er kam n\u00e4her, Schritt f\u00fcr Schritt, bis seine Nase Lenas Finger ber\u00fchrte.',
      '\u201eNa sowas\u201c, murmelte Tante Sarah. \u201eDas hat er bei niemandem gemacht.\u201c',
      'Sp\u00e4ter, aus dem Dachfenster, sah Lena ein schwaches silbriges Leuchten am Ende des Stalls. Das Kribbeln in ihrem Bauch sagte ihr: ein Abenteuer begann.'
    ]},
  { id:2, title:"Nach dem Regen", image:"bilder/web/kap02_nach_dem_regen.jpg", magical:false, effects:['rain'],
    paragraphs: [
      'In der Nacht kam der Regen. Zwischen den Regenst\u00f6\u00dfen h\u00f6rte Lena ein metallisches Klingen, wie ein Gl\u00f6ckchen.',

      'Finn, der strubbelige Junge vom Nachbarhof: \u201eMondschimmer ist uralt. Der war schon hier, als meine Oma noch ein Kind war.\u201c',
      'Und Mia kam angeschossen \u2013 lockige rote Haare und ein Lachen, das man drei Koppeln weit h\u00f6ren konnte.',
      '<span class="separator">\u2604 \u2604 \u2604</span>',
      'Kurz vor Mittag: eine Hufspur im nassen Boden. Aber sie <em>schimmerte</em>. Silbrig. Eine ganze Linie f\u00fchrte vom Stall zum Waldpfad.',
      '\u201eSilberne Hufspuren.\u201c \u2013 \u201eSilberne <em>was</em>?\u201c',
      'Aber es war kein Witz. Die Spuren f\u00fchrten zum Wald.'
    ]},
  { id:3, title:"Die Spur im Wald", image:"bilder/web/kap03_spur_im_wald.jpg", magical:false, effects:['fireflies'],
    paragraphs: [
      'Lena und Mia folgten den Spuren in den Wald. Der silbrige Schimmer leuchtete wie kleine Wegweiser.',

      'Eine Lichtung. In der Mitte ein flacher Stein mit Gravur \u2013 ein Hufeisen und eine Sonne \u00fcber einer Weide.',

let mapScale = 1, mapX = 0, mapY = 0;

// Load
try {
  const s = JSON.parse(localStorage.getItem('lena-v2') || '{}');
  if (s.readChs) readChs = new Set(s.readChs);
  if (s.curCh !== undefined) curCh = s.curCh;
} catch(e) {}

function save() {
  try { localStorage.setItem('lena-v2', JSON.stringify({ readChs:[...readChs], curCh })); } catch(e) {}
}

// ========== INIT ==========
function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*60+'%';
    s.style.animationDelay = Math.random()*3+'s';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    c.appendChild(s);
  }
}

function startApp() {
  AudioMgr.init();
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('bottomNav').style.display = 'flex';
  document.getElementById('globalCtrl').style.display = 'flex';
  showScreen('storyScreen');
}

function showScreen(id) {
  curScreen = id; stopTTS();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.screen === id));
  if (id === 'storyScreen') renderCh();
  if (id === 'mapScreen') renderMap();
  if (id === 'horsesScreen') renderHorses();
  if (id === 'quizScreen') renderQuizMode();
  if (id === 'adventureScreen') renderAdv();
}

// ========== STORY ==========
function renderCh() {
  const ch = chapters[curCh]; readChs.add(curCh); save();
  document.getElementById('chTitle').textContent = `Kapitel ${ch.id} \u2013 ${ch.title}`;
  document.getElementById('prevBtn').disabled = curCh === 0;
  document.getElementById('nextBtn').disabled = curCh === chapters.length - 1;

  // Ambient sound
  AudioMgr.playAmbient(chapterAmbient[curCh]);

  // Dots
  document.getElementById('chDots').innerHTML = chapters.map((_,i) => {
    let c = 'ch-dot'; if (i===curCh) c+=' current'; else if (readChs.has(i)) c+=' read';
    return `<button class="${c}" onclick="event.stopPropagation();gotoCh(${i})"></button>`;
  }).join('');

  // Build effects
  let effects = '';
  if (ch.effects.includes('rain')) {
    let drops = '';
    for (let i = 0; i < 40; i++) {
      const left = Math.random()*100, dur = 0.4+Math.random()*0.4, delay = Math.random()*2, h = 15+Math.random()*25;
      drops += `<div class="raindrop" style="left:${left}%;height:${h}px;animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
    }
    effects += `<div class="rain-overlay">${drops}</div>`;
  }
  if (ch.effects.includes('hoofs')) {
    for (let i = 0; i < 6; i++) {
      const x = 10+Math.random()*80, y = 20+Math.random()*60, d = Math.random()*4;
      effects += `<div class="hoof-particle" style="left:${x}%;top:${y}%;animation-delay:${d}s;color:var(--silver-glow)">\u2727</div>`;
    }
  }
  if (ch.effects.includes('fireflies')) {
    for (let i = 0; i < 8; i++) {
      const x = 5+Math.random()*90, y = 10+Math.random()*70, d = Math.random()*6;
      effects += `<div class="firefly" style="left:${x}%;top:${y}%;animation-delay:${d}s"></div>`;
    }
  }
  if (ch.effects.includes('moon')) {
    effects += '<div class="moon-glow"></div>';
  }

  const mag = ch.magical ? ' magical' : '';
  document.getElementById('storyCont').innerHTML = `
    <div class="ch-illust${mag}">
      <img src="${ch.image}" alt="${ch.title}" loading="lazy">
      <div class="illust-particles">${effects}</div>
    </div>
    <div class="ch-text">${ch.paragraphs.map(p => `<p>${p}</p>`).join('')}</div>
  `;
  document.getElementById('storyCont').scrollTop = 0;
}

function chgCh(d) { const n=curCh+d; if(n>=0&&n<chapters.length){curCh=n;save();stopTTS();renderCh();} }
function gotoCh(i) { curCh=i; save(); stopTTS(); renderCh(); closeChSel(); }
function openChSel() {
  document.getElementById('chSelList').innerHTML = chapters.map((c,i) =>
    `<button class="ch-sel-item" onclick="gotoCh(${i})"><span class="cnum">${c.id}</span><span>${c.title}</span></button>`
  ).join('');
  document.getElementById('chSelOverlay').classList.add('active');
}
function closeChSel() { document.getElementById('chSelOverlay').classList.remove('active'); }

function applyMapTransform() {
  document.getElementById('mapInner').style.transform = `translate(${mapX}px,${mapY}px) scale(${mapScale})`;
}
function mapZoom(d) { mapScale = Math.max(0.5, Math.min(3, mapScale + d * 0.3)); applyMapTransform(); }
function mapReset() { mapScale = 1; mapX = 0; mapY = 0; applyMapTransform(); }

function initMapTouch() {
  const el = document.getElementById('mapWrap');
  let startDist = 0, startScale = 1, startX = 0, startY = 0, lastX = 0, lastY = 0, dragging = false;

  el.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      startScale = mapScale;
    } else if (e.touches.length === 1) {
      dragging = true; startX = e.touches[0].clientX - mapX; startY = e.touches[0].clientY - mapY;
    }
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      mapScale = Math.max(0.5, Math.min(3, startScale * (dist / startDist)));
      applyMapTransform();
    } else if (e.touches.length === 1 && dragging) {
      mapX = e.touches[0].clientX - startX; mapY = e.touches[0].clientY - startY;
      applyMapTransform();
    }
  }, { passive: true });

  el.addEventListener('touchend', () => { dragging = false; }, { passive: true });
}

function showMapPop(id) {
  const l = mapLocations.find(x => x.id === id); if (!l) return;
  document.getElementById('popupCard').innerHTML = `
    <img src="${l.img}" alt="${l.title}">
    <div class="popup-body"><h3>${l.title}</h3><p>${l.desc}</p>
    <button class="popup-close" onclick="closeMapPop()">Schlie\u00dfen</button>
    <button class="popup-action" onclick="closeMapPop();gotoCh(${l.chapter});showScreen('storyScreen')">Kapitel lesen</button></div>`;
  document.getElementById('mapPopup').classList.add('active');
}
function closeMapPop() { document.getElementById('mapPopup').classList.remove('active'); }

// ========== HORSES ==========

  document.getElementById('horsesGrid').innerHTML = horses.map(h => `
    <div class="horse-card horse-${h.key}" onclick="this.classList.toggle('flipped')">
      <div class="horse-card-inner">
        <div class="horse-card-front"><div class="hemoji">${h.emoji}</div><h4>${h.name}</h4><div class="htrait">${h.character}</div></div>
        <div class="horse-card-back"><h4>${h.name}</h4>
          <div class="stat"><b>Farbe:</b> ${h.color}</div><div class="stat"><b>Alter:</b> ${h.age}</div>
          <div class="stat"><b>Rasse:</b> ${h.breed}</div><div class="stat"><b>St\u00e4rke:</b> ${h.strength}</div>
          <div class="hdesc">${h.desc}</div></div>

}

// ========== QUIZ ==========
function setQuizMode(mode) {
  quizMode = mode;
  document.querySelectorAll('.quiz-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(
    mode === 'quiz' ? 'quiz' : mode === 'memory' ? 'memory' : 'wer'
  )));
  renderQuizMode();
}

function renderQuizMode() {
  document.getElementById('qScoreDisp').textContent = '';
  if (quizMode === 'quiz') renderQuiz();
  else if (quizMode === 'memory') renderMemory();
  else renderWBI();
}

// --- Classic Quiz ---
function shuffleQ() { qState.shuffled=[...quizQuestions].sort(()=>Math.random()-.5).slice(0,10); qState.cur=0; qState.score=0; qState.answered=false; }
function renderQuiz() {
  if (!qState.shuffled.length) shuffleQ();
  const qs=qState.shuffled, idx=qState.cur;
  document.getElementById('qScoreDisp').textContent = `Punkte: ${qState.score}/${qs.length}`;
  if (idx >= qs.length) { renderQResult(); return; }
  const q = qs[idx];
  document.getElementById('quizCont').innerHTML = `<div class="quiz-card">
    <div class="qprogress">Frage ${idx+1} von ${qs.length}</div>
    <div class="qquestion">${q.q}</div>
    <div class="qanswers">${q.answers.map((a,i) => `<button class="qanswer" onclick="ansQ(${i})" ${qState.answered?'disabled':''}>${a}</button>`).join('')}</div>
    <div class="qfeedback" id="qFeed"></div>
    <button class="qnext" id="qNext" onclick="nextQ()">${idx<qs.length-1?'N\u00e4chste Frage':'Ergebnis'}</button>
  </div>`;
}
function ansQ(i) {
  if (qState.answered) return; qState.answered = true;
  const q = qState.shuffled[qState.cur];
  document.querySelectorAll('.qanswer').forEach((b,j) => { b.disabled=true; if(j===q.correct) b.classList.add('correct'); if(j===i&&j!==q.correct) b.classList.add('wrong'); });
  if (i===q.correct) { qState.score++; document.getElementById('qFeed').textContent='Richtig!'; document.getElementById('qFeed').style.color='#4caf50'; }
  else { document.getElementById('qFeed').textContent='Die Antwort war: '+q.answers[q.correct]; document.getElementById('qFeed').style.color='#ef5350'; }
  document.getElementById('qNext').classList.add('visible');
  document.getElementById('qScoreDisp').textContent = `Punkte: ${qState.score}/${qState.shuffled.length}`;
}
function nextQ() { qState.cur++; qState.answered=false; renderQuiz(); }
function renderQResult() {
  const t=qState.shuffled.length, s=qState.score, p=s/t;
  let e,m; if(p===1){e='\u{1F3C6}';m='Perfekt!';}else if(p>=.7){e='\u2B50';m='Super!';}else if(p>=.4){e='\u{1F44D}';m='Gut gemacht!';}else{e='\u{1F4DA}';m='Lies nochmal und versuch es wieder!';}
  document.getElementById('quizCont').innerHTML = `<div class="quiz-card"><div class="qresult">
    <div class="remoji">${e}</div><h3>${s} von ${t} richtig!</h3><p>${m}</p>
    <button class="qrestart" onclick="shuffleQ();renderQuiz()">Nochmal</button></div></div>`;
}

// --- Memory ---
function renderMemory() {
  const pairs = horses.slice(0,6).flatMap(h => [{name:h.name,emoji:h.emoji,bg:h.key},{name:h.name,emoji:h.emoji,bg:h.key}]);
  for (let i=pairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
  memState = { cards:pairs, flipped:[], matched:0, moves:0, locked:false };
  const colors = { mondschimmer:'#d8d8f0', sturmwind:'#dcc8b0', butterblume:'#ffe8a0', flecki:'#b0d8b2', kupfer:'#d4b890', sternchen:'#d5a8e0', nordlicht:'#d0d0d0' };

  document.getElementById('qScoreDisp').textContent = `Z\u00fcge: 0`;
  document.getElementById('quizCont').innerHTML = `
    <div class="memory-status" id="memStatus">Finde die Paare!</div>
    <div class="memory-grid">${pairs.map((p,i) => `
      <div class="mem-card" onclick="flipMem(${i})"><div class="mem-card-inner">
        <div class="mem-face mem-front"></div>
        <div class="mem-face mem-back" style="background:${colors[p.bg]||'#eee'};font-size:2rem">${p.emoji}<br><span style="font-size:0.5rem">${p.name}</span></div>
      </div></div>`).join('')}</div>`;
}
function flipMem(i) {
  if (memState.locked) return;
  const cards = document.querySelectorAll('.mem-card');
  if (cards[i].classList.contains('flipped') || cards[i].classList.contains('matched')) return;
  cards[i].classList.add('flipped'); memState.flipped.push(i);
  if (memState.flipped.length === 2) {
    memState.moves++; memState.locked = true;
    document.getElementById('qScoreDisp').textContent = `Z\u00fcge: ${memState.moves}`;
    const [a,b] = memState.flipped;
    if (memState.cards[a].name === memState.cards[b].name) {
      cards[a].classList.add('matched'); cards[b].classList.add('matched');
      memState.matched += 2; memState.flipped = []; memState.locked = false;
      if (memState.matched >= memState.cards.length) {
        document.getElementById('memStatus').innerHTML = `\u{1F3C6} Geschafft in ${memState.moves} Z\u00fcgen!`;
      }
    } else {
      setTimeout(() => { cards[a].classList.remove('flipped'); cards[b].classList.remove('flipped'); memState.flipped=[]; memState.locked=false; }, 800);
    }
  }
}

// --- Wer bin ich? ---
function renderWBI() {
  if (wbiState.cur >= wbiRiddles.length) wbiState.cur = 0;
  wbiState.clueIdx = 0; wbiState.answered = false;
  const r = wbiRiddles[wbiState.cur];
  document.getElementById('qScoreDisp').textContent = `Pferd ${wbiState.cur+1}/${wbiRiddles.length}`;
  document.getElementById('quizCont').innerHTML = `<div class="wbi-card">
    <div class="qquestion">Welches Pferd bin ich?</div>
    <div class="wbi-clues" id="wbiClues">${r.clues.map((c,i) => `<div class="wbi-clue" id="clue${i}">${i+1}. ${c}</div>`).join('')}</div>
    <button class="qnext visible" id="wbiHintBtn" onclick="showWBIClue()" style="display:block;background:var(--gold)">N\u00e4chster Hinweis</button>
    <div class="wbi-choices" id="wbiChoices" style="display:none">${r.options.map(o => `<button class="wbi-choice" onclick="ansWBI('${o}')">${o}</button>`).join('')}</div>
    <div class="qfeedback" id="wbiFeed"></div>
  </div>`;
  showWBIClue();
}
function showWBIClue() {
  const r = wbiRiddles[wbiState.cur];
  if (wbiState.clueIdx < r.clues.length) {
    document.getElementById('clue'+wbiState.clueIdx).classList.add('visible');
    wbiState.clueIdx++;
  }
  if (wbiState.clueIdx >= r.clues.length) {
    document.getElementById('wbiHintBtn').style.display = 'none';
    document.getElementById('wbiChoices').style.display = 'grid';
  }
}
function ansWBI(name) {
  if (wbiState.answered) return; wbiState.answered = true;
  const r = wbiRiddles[wbiState.cur];
  document.querySelectorAll('.wbi-choice').forEach(b => {
    if (b.textContent === r.answer) b.classList.add('correct');
    else if (b.textContent === name && name !== r.answer) b.classList.add('wrong');
    b.style.pointerEvents = 'none';
  });
  const feed = document.getElementById('wbiFeed');
  if (name === r.answer) { feed.textContent = 'Richtig!'; feed.style.color = '#4caf50'; }
  else { feed.textContent = 'Es war ' + r.answer + '!'; feed.style.color = '#ef5350'; }
  setTimeout(() => { wbiState.cur++; renderWBI(); }, 1800);
}

// ========== ADVENTURE ==========
function renderAdv() {
  const scene = advScenes.find(s => s.id === advState.scene) || advScenes[0];
  if (scene.id === 'start') advState.inventory = [];

  const invHTML = advState.inventory.length ? advState.inventory.map(it => {
    const icons = { silberne_spur:'\u2728 Silberne Spur', altes_foto:'\u{1F4F7} Altes Foto', hofzeichen:'\u{1F31E} Hofzeichen', raetsel_1:'\u{1F4DC} R\u00e4tsel 1', schluessel:'\u{1F5DD} Schl\u00fcssel', raetsel_2:'\u{1F4DC} R\u00e4tsel 2', silberkette:'\u2728 Silberkette' };
    return `<span class="inv-item">${icons[it]||it}</span>`;
  }).join('') : '<span style="font-size:0.7rem;color:#999">Noch keine Gegenst\u00e4nde</span>';

  document.getElementById('advContent').innerHTML = `
    <div class="adv-scene"><img src="${scene.img}" alt="Szene" loading="lazy"></div>
    <div class="adv-inventory"><span class="adv-inventory-title">Inventar:</span>${invHTML}</div>
    <div class="adv-text">${scene.text}</div>
    <div class="adv-choices">${scene.choices.map(c =>
      `<button class="adv-choice" onclick="advChoice('${c.next}','${c.gives||''}')">${c.text}</button>`
    ).join('')}</div>`;
  document.getElementById('advContent').scrollTop = 0;
}
function advChoice(next, gives) {
  if (gives && !advState.inventory.includes(gives)) advState.inventory.push(gives);
  advState.scene = next; renderAdv();
}

// ========== HOOFPRINT TRAIL ==========
let lastTrail = 0;
document.addEventListener('pointerdown', e => {
  if (curScreen === 'startScreen') return;
  const now = Date.now(); if (now - lastTrail < 200) return; lastTrail = now;
  const t = document.createElement('div'); t.className = 'hoof-trail';
  t.style.left = (e.clientX-8)+'px'; t.style.top = (e.clientY-9)+'px';
  document.body.appendChild(t); setTimeout(() => t.remove(), 1500);
});

// ========== VOICES INIT ==========
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};

// ========== INIT ==========
initStars();
</script>
