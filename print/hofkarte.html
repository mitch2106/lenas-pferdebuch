<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1190 842" width="1190" height="842">
<defs>
  <!-- Parchment texture filter -->
  <filter id="parchment">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
    <feDiffuseLighting in="noise" lighting-color="#f5e6c8" surfaceScale="2" result="light">
      <feDistantLight azimuth="45" elevation="55"/>
    </feDiffuseLighting>
    <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
  </filter>

  <!-- Sketchy line filter -->
  <filter id="sketch">
    <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Hand-drawn effect -->
  <filter id="handdrawn">
    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Soft shadow -->
  <filter id="shadow">
    <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#5a3e1b" flood-opacity="0.3"/>
  </filter>

  <!-- Water pattern -->
  <pattern id="waterPattern" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
    <path d="M0,5 Q5,2 10,5 Q15,8 20,5" fill="none" stroke="#7fb3d4" stroke-width="0.8" opacity="0.5"/>
  </pattern>

  <!-- Grass pattern -->
  <pattern id="grassPattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
    <line x1="3" y1="12" x2="4" y2="7" stroke="#6b8c42" stroke-width="0.6" opacity="0.3"/>
    <line x1="8" y1="12" x2="9" y2="8" stroke="#7a9c4f" stroke-width="0.6" opacity="0.25"/>
  </pattern>

  <!-- Tree symbol -->
  <symbol id="tree" viewBox="0 0 30 40">
    <ellipse cx="15" cy="12" rx="11" ry="12" fill="#4a7c3a" opacity="0.85"/>
    <ellipse cx="15" cy="14" rx="9" ry="10" fill="#5a8c48"/>

    <rect x="13" y="22" width="4" height="10" fill="#6b4c2a" rx="1"/>
  </symbol>

  <!-- Deciduous tree variant -->
  <symbol id="tree2" viewBox="0 0 30 40">
    <circle cx="15" cy="13" r="10" fill="#3d6e30" opacity="0.8"/>
    <circle cx="11" cy="11" r="7" fill="#4d7e3e" opacity="0.7"/>
    <circle cx="19" cy="10" r="6" fill="#5a8a4a" opacity="0.6"/>
    <rect x="13" y="21" width="4" height="11" fill="#5a3e1b" rx="1"/>
  </symbol>

  <!-- Conifer -->
  <symbol id="conifer" viewBox="0 0 24 40">
    <polygon points="12,2 4,18 8,18 2,30 22,30 16,18 20,18" fill="#2d5a25" opacity="0.85"/>
    <polygon points="12,5 6,18 8,18 4,28 20,28 16,18 18,18" fill="#3a6e32"/>
    <rect x="10" y="28" width="4" height="8" fill="#5a3e1b" rx="1"/>
  </symbol>

  <!-- Horse silhouette -->

    <path d="M8,22 Q6,18 8,14 Q10,10 14,9 L16,5 L18,4 L17,8 Q20,7 24,8 Q28,9 30,12 Q33,10 35,11 Q34,13 32,14 Q34,16 33,20 Q32,22 30,24 L30,28 L28,28 L28,24 Q26,25 24,24 L24,28 L22,28 L22,24 Q18,25 14,24 L14,28 L12,28 L12,24 Q10,25 10,24 L10,28 L8,28 L8,24 Z" fill="currentColor"/>
  </symbol>

  <!-- Horseshoe -->
  <symbol id="horseshoe" viewBox="0 0 30 34">
    <path d="M6,8 Q6,2 15,2 Q24,2 24,8 L24,22 Q24,24 22,24 Q20,24 20,22 L20,10 Q20,6 15,6 Q10,6 10,10 L10,22 Q10,24 8,24 Q6,24 6,22 Z" fill="none" stroke="#8b6914" stroke-width="2.5"/>

    <circle cx="22" cy="25" r="2" fill="#8b6914"/>
  </symbol>

  <!-- Silver hoofprint -->

  <!-- Compass rose -->
  <symbol id="compass" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="none" stroke="#8b6914" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#8b6914" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- N arrow -->

    <!-- S arrow -->
    <polygon points="50,90 46,55 50,62 54,55" fill="#8b6914" opacity="0.5"/>
    <!-- E arrow -->
    <polygon points="90,50 55,46 62,50 55,54" fill="#8b6914" opacity="0.5"/>
    <!-- W arrow -->
    <polygon points="10,50 45,46 38,50 45,54" fill="#8b6914" opacity="0.5"/>
    <circle cx="50" cy="50" r="4" fill="#8b6914"/>
    <circle cx="50" cy="50" r="2" fill="#f5e6c8"/>
  </symbol>

  <!-- Stepping stone -->
  <symbol id="steppingStone" viewBox="0 0 12 8">
    <ellipse cx="6" cy="4" rx="5" ry="3" fill="#9a8a72" stroke="#7a6a52" stroke-width="0.5"/>
  </symbol>

</defs>
